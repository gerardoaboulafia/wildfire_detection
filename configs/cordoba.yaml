# Córdoba Province — Wildfire Susceptibility Project Config

study_area:
  # Bounding box [lon_min, lat_min, lon_max, lat_max]
  bbox: [-65.8, -35.0, -61.7, -29.3]
  province: "Córdoba"
  country: "Argentina"

crs:
  storage: "EPSG:4326"
  metric: "EPSG:32720"  # UTM Zone 20S — for distance calculations in Argentina

periods:
  training:
    start: "2001-01-01"
    end: "2022-12-31"
  validation:
    start: "2023-01-01"
    end: "2024-12-31"

fire_season:
  months: [8, 9, 10, 11]  # Aug–Nov

sampling:
  negative_buffer_km: 5       # Min distance from any fire point for negatives
  grid_resolution_m: 500      # Prediction grid cell size
  train_test_split: 0.70      # 70% train, 30% test
  random_seed: 42

mlflow:
  experiment_name: "wildfires-cordoba"
  tracking_uri: "mlruns"

paths:
  raw: "data/raw"
  processed: "data/processed"
  outputs: "outputs"
  models: "models"

firms:
  modis_confidence_min: "nominal"  # Values: "low", "nominal", "high"
  viirs_confidence_min: "n"         # Values: "l", "n", "h"

gee:
  # SRTM DEM
  dem_dataset: "USGS/SRTMGL1_003"
  dem_scale_m: 30
  # MODIS NDVI
  ndvi_dataset: "MODIS/061/MOD13A1"
  ndvi_scale_m: 500
  ndvi_band: "NDVI"
  ndvi_scale_factor: 0.0001
  # MODIS LST
  lst_dataset: "MODIS/061/MOD11A2"
  lst_scale_m: 1000
  lst_band: "LST_Day_1km"
  lst_scale_factor: 0.02
  lst_offset_k: 0.0  # Already in Kelvin; subtract 273.15 for Celsius
  export_folder: "wildfires_cordoba_gee"

era5:
  variables:
    - "2m_temperature"
    - "total_precipitation"
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"
    - "2m_dewpoint_temperature"
  product_type: "reanalysis"
  dataset: "reanalysis-era5-land"
  format: "netcdf"

soilgrids:
  properties: ["bdod", "phh2o", "clay", "soc", "ocd", "ocs"]
  depths: ["0-5cm", "5-15cm", "15-30cm", "0-30cm"]
  # Top 30 cm is most relevant for wildfire fuel moisture
  target_depths: ["0-5cm", "5-15cm", "15-30cm"]

feature_selection:
  vif_threshold: 10.0
  correlation_threshold: 0.85
